{% extends "base.html" %}
{% block content %}

<h1>Admin Login</h1>

<div class="form-card">

<form method="POST">
    <input type="text" name="username" placeholder="Admin Username" required>
    <input type="password" name="password" placeholder="Admin Password" required>
    <button type="submit" class="btn btn-danger">Login as Admin</button>
</form>

</div>

{% endblock %}
